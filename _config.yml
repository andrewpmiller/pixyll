# Site settings
title:       PRESEQUENCES
email:       
author:      Andrew Miller
description: "Things I think about: design, photography, sound, and technology."
baseurl:     ""
url:         "https://andrewpmiller.github.io"
date_format: "%b %-d, %Y"
header_pages: 
show_navigation: false
  
# Google services
# google_analytics: 

# Optional features

show_related_posts:   false
show_post_footers:    false
enable_mathjax: false
extended_fonts: true

# Preview image for social media aka og:image and twitter:image
post_preview_image: true


text:
  pagination:
    newer: 'Newer'
    older: 'Older'
  post:
    updated:        'Updated'
    minute_read:    'minute read'
    related_posts:  'Related Posts'
  index:
    coming_soon: 'Coming soon...'
  og_locale: 'en_US'

# Build settings
markdown:     kramdown
permalink:    pretty
paginate:     12
sass:
  style: compressed
plugins:
  - jekyll-paginate
  - jekyll-sitemap
# https://github.com/jekyll/jekyll/issues/2938
exclude:
  - Gemfile
  - Gemfile.lock
  - Rakefile
  - README.md
  - screenshot.png
  - vendor
