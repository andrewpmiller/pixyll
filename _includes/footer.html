<footer class="center">
  <div class="measure">
    <small>
      &copy; {{ site.time | date: "%Y" }} {{ site.author }}. All rights reserved.
    </small>
  </div>
</footer>
{% if site.enable_anchorjs %}<!-- AnchorJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/anchor-js/4.3.1/anchor.min.js" integrity="sha512-zPB79j2C+3sFS9zcH3jwqteXGE+ SE9kn8GMSe+mXjP7McnbpulS4AXZQkedtKSVp1xdNNW9upwW7sk5g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
    anchors.options.visible = 'always';
    anchors.add('article h2, article h3, article h4, article h5, article h6');
</script>{% endif %}
<script type="text/javascript">
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("{{ '/sw.js' | relative_url }}")
    }
</script>
